<!DOCTYPE html>
{% extends "base.html" %}
{% load static %}
{% block title %}Secure Login | REVO{% endblock %}

{% block body %}
<!-- Messages already handled in base.html -->

<div class="container d-flex align-items-center justify-content-center min-vh-100 py-5" style="position: relative; z-index: 5;">
  <div class="glass-panel col-md-6 col-lg-4 p-5" style="backdrop-filter: blur(20px);">
    <div class="text-center mb-5">
      <i class="fas fa-shield-alt fa-4x mb-3" style="color: #00f2fe;"></i>
      <h1 class="nebula-text mb-1">Access Granted</h1>
      <p class="text-light opacity-75 mb-0">Enter your credentials to continue</p>
    </div>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-4">
        <label for="username" class="form-label text-white">Username or Email</label>
        <div class="input-group input-group-lg">
          <span class="input-group-text bg-transparent border-end-0 text-white" style="border-color: rgba(255,255,255,0.2) !important;">
            <i class="fas fa-user text-info"></i>
          </span>
          <input type="text" class="form-control bg-transparent border-start-0 text-white" id="username" name="username" placeholder="Enter username or email" required style="border-color: rgba(255,255,255,0.3) !important;">
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label text-white">Password</label>
        <div class="input-group input-group-lg">
          <span class="input-group-text bg-transparent border-end-0 text-white" style="border-color: rgba(255,255,255,0.2) !important;">
            <i class="fas fa-lock text-info"></i>
          </span>
          <input type="password" class="form-control bg-transparent border-start-0 text-white" id="password" name="password" placeholder="Enter your password" required style="border-color: rgba(255,255,255,0.3) !important;">
        </div>
      </div>

      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-lg btn-stellar">
          <i class="fas fa-rocket me-2"></i>Launch
        </button>
      </div>

      <div class="text-center mt-4">
        <p class="text-light opacity-75 mb-0">
          No account? <a href="/signup/" class="text-info text-decoration-none fw-bold">Create Mission Control</a>
        </p>
      </div>
    </form>
  </div>
</div>

<style>
  .nebula-text {
    background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
    letter-spacing: 1px;
  }

  .btn-stellar {
    background: transparent;
    color: #00f2fe;
    border: 2px solid #00f2fe;
    padding: 12px 30px;
    border-radius: 50px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.4s ease;
  }

  .btn-stellar:hover {
    background: #00f2fe;
    color: #020205;
    box-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
    transform: translateY(-2px);
  }

  .glass-panel {
    background: rgba(15, 15, 25, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 25px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.7);
  }

  .form-control:focus {
    border-color: #00f2fe !important;
    box-shadow: 0 0 0 0.25rem rgba(0, 242, 254, 0.25) !important;
    background-color: rgba(255,255,255,0.05) !important;
  }

  .input-group-text {
    background-color: rgba(255,255,255,0.05) !important;
  }
</style>
{% endblock %}
